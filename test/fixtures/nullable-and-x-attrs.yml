openapi: 3.0.0
info:
    title: NullableAndXAttrs
    version: "1.0.0"
paths:
    /cards:
        get:
            responses:
                "200":
                    description: Cards
                    content:
                        application/json:
                            schema:
                                type: object
                                x-example: dummy
                                properties:
                                    cardId:
                                        type: string
                                    cardType:
                                        type: string

openapi: 3.0.0
info:
    title: NestedCatalogs
    version: "1.0.0"
paths:
    /accounts/{accountId}:
        get:
            parameters:
                - name: accountId
                  in: path
                  required: true
                  schema: { type: string }
            responses:
                "200":
                    description: Account detail
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    status:
                                        type: string
                                    currencyFolders:
                                        type: object
                                        additionalProperties:
                                            type: object
                                            properties:
                                                status:
                                                    type: string
                                                    x-catalog: CURRENCYFOLDERSTATUS
                                                balance:
                                                    type: number

openapi: 3.0.0
info:
    title: AllMethods
    version: "1.0.0"
paths:
    /things:
        get:
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                type: object
                                properties: { count: { type: integer } }
        post:
            responses:
                "201":
                    description: Created
                    content:
                        application/json:
                            schema:
                                type: object
                                properties: { id: { type: string } }
        put:
            responses:
                "200":
                    description: OK
        patch:
            responses:
                "200":
                    description: OK
        delete:
            responses:
                "204":
                    description: No Content
        options:
            responses:
                "200":
                    description: OK
        head:
            responses:
                "200":
                    description: OK

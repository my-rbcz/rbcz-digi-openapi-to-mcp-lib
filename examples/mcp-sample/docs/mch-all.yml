openapi: 3.0.0
info:
  version: 7.0-SNAPSHOT
  title: RBCZ
  description: 'Consolidated API for RBCZ MCP/API server'
  license:
    name: MIT
    url: http://github.com/gruntjs/grunt/blob/master/LICENSE-MIT
paths:
  /clients:
    get:
      summary: List of clients
      description: |
        CALL THIS FIRST, to get clientId of preferred client (preferred=true) and use it for subsequent calls.
      #parameters:
      #- name: multicontext
      #  description: do not use
      #  in: query
      #  required: false
      #  example: true
      #  schema:
      #    type: boolean
      operationId: List of clients
      responses:
        '200':
          description: |
            Available clients for currently logged user and user authentication method. If multicontext query param is set to true and multicontext is enabled (based on business rules), then response also contains artifical client with clientId=-1 and multicontextClient=true.
          content:
            application/json:
              schema:
                properties:
                  clients:
                    type: array
                    items:
                      $ref: '#/components/schemas/ClientSegment'
                  #currentAuthMethod:
                    #description: a name of the a user currently used authentication
                      #method
                    #type: string
                required:
                - clients
                #- currentAuthMethod
      x-unitTests: []
      x-operation-settings:
        CollectParameters: false
        AllowDynamicQueryParameters: false
        AllowDynamicFormParameters: false
        IsMultiContentStreaming: false
  /contacts:
    get:
      description: |
        Get contacts (address, phone, email) for given client id.
        Allways call withClientContacts=false and withUserContacts=true
      summary: Get contacts for client and user
      operationId: Get contacts for client and user
      parameters:
      - name: clientId
        in: query
        required: true
        #description: the selected client context
        schema:
          type: number
          format: double
      - name: withClientContacts
        in: query
        required: false
        description: alway set to false
        schema:
          type: boolean
      - name: withUserContacts
        in: query
        required: false
        description: alway set to true
        schema:
          type: boolean
      #- name: phoneType
      #  in: query
      #  required: false
      #  description: optional filter phone numbers by its type MOBILE_NUMBER, LANDLINE_NUMBER or FAX_NUMBER
      #  schema:
      #    type: string
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetContactsForClientAndUserResponse'
      x-unitTests:
      - request:
          method: GET
          uri: /contacts?clientId=2&withClientContacts=true&withUserContacts=true&phoneType=MOBILE_NUMBER
        expectedResponse:
          x-allowExtraHeaders: true
          x-bodyMatchMode: RAW
          x-arrayOrderedMatching: false
          x-arrayCheckCount: false
          x-matchResponseSchema: true
          headers:
            Content-Type: application/json
          body: '{    "addresses":        [{ "id":"12k12k21k21k1", "clientPreferred":"true",
            "userPreferred":"false", "addressee":"Alfons NovĂˇk",            "specification":"u
            panĂ­ NovĂ©",                         "street":"KavÄŤĂ­ hory",            "number":"50",
            "city":"Praha", "postalCode":"14000", "country":"CZ"        }], "emails":        [{
            "id":"981j291981", "contact":"bfu@bsc-ideas.com", "clientPreferred":"true",
            "userPreferred":"false"        }],    "phones": [{ "id":"a89a8080a", "contact":"420123456789",
            "clientPreferred":"true", "userPreferred":"false", "type":"MOBILE_NUMBER"
            }]}'
        x-testShouldPass: true
        x-testEnabled: true
        x-testName: Get contacts for client and user1
        x-testDescription: |-
          Get contacts from siebel for client and user.
          Note: if withClientContacts and withUserContacts are both set to false, then empty collections will be returned.
          Success Response payload:
          - `addresses` (Array[], M): addresses collections, always present (even empty)
              - `id` (String, M): the unique id of address contact
              - `clientPreferred` (Boolean, O): if this address is preferred by client
              - `userPreferred` (Boolean, O): if this address is preferred by user
              - `addressee` (String, O): the addressee
              - `specification` (String, O): the detail of specification
              - `street` (String, O): the street
              - `number` (String, O): the number
              - `city` (String, O): the city
              - `postalCode` (String, O): the postal code
              - `country` (String, O): the country (ISO format, e.g.: CZ), from catalog Countries (see /catalogs/Countries)
          - `emails` (Array[], M): emails collections, always present (even empty)
              - `id` (String, M): the unique id of email contact
              - `contact` (String, O): the e-mail adddress
              - `clientPreferred` (Boolean, O): if this phone is preferred by client
              - `userPreferred` (Boolean, O): if this phone is preferred by user
          - `phones` (Array[], M): phones collections, always present (even empty)
              - `id` (String, M): the unique id of phone contact
              - `contact` (String, O): the telephone number
              - `clientPreferred` (Boolean, O): if this phone is preferred by client
              - `userPreferred` (Boolean, O): if this phone is preferred by user
              - `type` (String, M): values from catalog ContactType (see /catalogs/ContactType)
      x-operation-settings:
        CollectParameters: false
        AllowDynamicQueryParameters: false
        AllowDynamicFormParameters: false
        IsMultiContentStreaming: false
  /user/info:
    get:
      description: Info for currently logged user and given client id, e.g. login name (e.g. klientské číslo)
      summary: Get info about currently logged user
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - $ref: '#/components/parameters/MultiContextClientIdQueryParam'
      #- in: query
        #name: loadRSTSDetail
        #description: Flag to load RSTS detail
        #schema:
          #type: boolean
          #default: false
      responses:
        '200':
          description: Information about currently logged user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfoResponse'
      x-unitTests: []
      x-operation-settings:
        CollectParameters: false
        AllowDynamicQueryParameters: false
        AllowDynamicFormParameters: false
        IsMultiContentStreaming: false
  /catalogs/bulk:
    post:
      description: To translaste numerical CATALOG codes to human readable values. It support bulk transaction.
      summary: List of catalog values for required catalogs
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/BulkCatalogValuesRequest'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BulkCatalogValuesResponse'
        '400':
          description: Input error - missing or malformed parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '500':
          $ref: '#/components/responses/500'
  /accounts:
    get:
      description: List of accounts (current, savings, tied, escrow, hedging, protected) for client id.
      summary: Accounts list
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - $ref: '#/components/parameters/MultiContextClientIdQueryParam'
      #- name: withAccGroups
      #  description: |
      #    List of account groups. If present, only accounts with group within given group list are returned. If account group is not in group list, the account is removed from result. Only one of optional parameters (withAccGroups and withoutAccGroups) is expected. In case both parameters are sent, only withAccGroups is taken into account.
      #  in: query
      #  required: false
      #  style: form
      #  explode: false
      #  schema:
      #    type: array
      #    items:
      #      type: string
      #      enum:
      #       - CURRENT
      #       - SAVINGS
      #       - TIED
      #       - ESCROW
      #       - HEDGING
      #       - PROTECTED
      #       x-example: TIED
      # - name: withoutAccGroups
      #   description: |
      #     List of account groups. If present, all accounts with group from the list are removed from the result set. If accounts group is not defined in the group list, the account is kept in the result set.
      #   in: query
      #   required: false
      #   style: form
      #   explode: false
      #   schema:
      #     type: array
      #     items:
      #       type: string
      #       enum:
      #       - CURRENT
      #       - SAVINGS
      #       - TIED
      #       - ESCROW
      #       - HEDGING
      #       - PROTECTED
      #       x-example: HEDGING
      # - name: withoutBalances
      #   description: |
      #     Flag indicating to not fetch currency folders for accounts. If set to true, then this method does not call TIF, but only fetches all information from database.
      #   in: query
      #   required: false
      #   example: true
      #   schema:
      #     type: boolean
      responses:
        '200':
          description: List (even empty) is returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccountsOverviewResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /accounts/{accountId}:
    get:
      description: Detail (price program/account type, interest rate tiers, conditions for bonus rates, insurrance) of account for given account id and client id.
      summary: Account detail
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - $ref: '#/components/parameters/ClientIdQueryParam'
      - name: accountId
        #description: The id of account
        in: path
        required: true
        x-asd-attribute: null
        example: 5
        schema:
          type: integer
          format: int64
      - name: interestRateBonusValidation
        description: ALWAYS set to true for SAVINGS accounts, and false otherwise.
        in: query
        required: false
        schema:
          type: boolean
          example: true (1)
          x-asd-attribute: null
          x-example: true
      responses:
        '200':
          description: Successful response with account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountDetailResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /debitcards:
    get:
      description: List of debit cards for client id.
      summary: Get list of debit cards
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - $ref: '#/components/parameters/ClientIdQueryParam'
      responses:
        '200':
          description: List (even empty) is returned
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/GetListOfDebitCardsResponse'
        '400':
          description: Input error (in that case error codes are returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /debitcards/transactions:
    post:
      description: List of debit card transactions for the given client id and debit card id. Supports pagination and sorting. 
      summary: Get list of debit card transactions
      parameters:
      - $ref: '#/components/parameters/AuthorizationHeader'
      - name: p
        description: Number of requested page (default value is 1)
        in: query
        required: false
        x-asd-attribute: null
        example: 1
        schema:
          type: string
      - name: s
        description: Size of page (default value is 20). DO NOT EXCEED 500.
        in: query
        required: false
        x-asd-attribute: null
        example: 20
        schema:
          type: string
      - name: sort
        description: 'Sorting attributes, use syntax: attribute,(asc|desc)'
        in: query
        required: false
        x-asd-attribute: null
        example: AccountingAmount,desc
        schema:
          type: string
          enum:
          - AccountingAmount,desc
          - AccountingAmount,asc
          - AccountingDate,desc
          - AccountingDate,asc
          - TransactionAmount,desc
          - TransactionAmount,asc
          - TransactionDate,desc
          - TransactionDate,asc
      #- $ref: '#/components/parameters/NoteFilter'
      #- $ref: '#/components/parameters/CategoriesFilter'
      responses:
        '200':
          description: List (even empty) is returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetListOfDebitCardTransactionsResponse'
        '400':
          description: Input error (in that case error codes are returned)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetListOfDebitCardTransactionsRequest'
        required: true
servers:
- url: http://www.example.com/
components:
  responses:
    '500':
      description: Unexpected error, user logout as potential security risk
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ErrorResponseBase'
    '403':
      description: User is not authorized to perform the operation.
      content:
        '*/*':
          schema:
            $ref: '#/components/schemas/ErrorResponseBase'
    '401':
      description: Authentication or re-authentication of the user is required
      headers:
        WWW-Authenticate:
          description: Contains base of URL for creation of authentication request
          x-example: https://gaas.bank.com/authorize
          schema:
            type: string
      content:
        '*/*':
          schema:
            type: object
    '400':
      description: Input error (in that case error codes are returned)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponseBase:
      description: Stores basic error attributes
      type: object
      required:
      - status
      - errorUuid
      properties:
        status:
          description: Response HTTP status code
          type: integer
          format: int32
          x-example: 400
        errorUuid:
          description: Unique ID of error occurrence
          type: string
          format: uuid
          x-example: f81d4fae-7dec-11d0-a765-00a0c91e6bf6
        errorDescription:
          description: Description of error, it may be be used or should by use only
            in develop mode
          type: string
    ErrorResponse:
      description: Stores validation error attributes, extends ErrorResponseBase
      required:
      - error
      allOf:
      - $ref: '#/components/schemas/ErrorResponseBase'
      - type: object
        properties:
          error:
            description: Structured description of the error
            type: object
            required:
            - errorCode
            properties:
              errorCode:
                description: Business error code
                type: integer
                x-example: 5000000
              message:
                description: Description of business error
                type: string
                x-example: Validation errors
              validationResults:
                description: List of validation errors found in request data
                type: array
                items:
                  type: object
                  required:
                  - attributeCode
                  - validatorCode
                  - messageCode
                  properties:
                    attributeCode:
                      description: Identification of attribute on which error was
                        found
                      type: string
                      x-example: amount
                    validatorCode:
                      description: Identification of validator. If "validatorCode"
                        is "RBCZ", then "messageCode" contains the error code form
                        common catalog list.
                      type: string
                      x-example: NotEmptyValidator
                    messageCode:
                      description: Identification of problem found
                      type: string
                      x-example: validation.error.NotEmpty
                    params:
                      description: List of validation parameters; concrete format
                        of individual parameters depends on validator
                      type: array
                      items:
                        type: object
                    translatedText:
                      description: Problem description
                      type: string
    GetListOfDebitCardTransactionsResponse:
      title: Get list of debit card transactions response
      type: object
      required:
      - content
      #- exactTotalElements
      - last
      #- totalPages
      #- totalElements
      #- size
      #- number
      #- first
      - sort
      #- numberOfElements
      properties:
        content:
          description: List of debit card transactions
          type: array
          items:
            type: object
            required:
            - cardId
            - paymentCardNumber
            - transactionId
            - accountCurrency
            - embossName
            - debitMovementType
            - transactionDate
            - accountingDate
            - transactionAmount
            - transactionCurrency
            - accountingAmount
            - accountingCurrency
            - movementGroup
            properties:
              cardId:
                description: ID of debit card (encoded)
                type: string
                x-asd-attribute: null
                x-example: MS4xLkQuMQ
              paymentCardNumber:
                description: Masked number of card
                type: string
                x-asd-attribute: null
                x-example: 516861XXXXXX0082
              transactionId:
                description: Identification of a transaction for client
                type: string
                x-asd-attribute: null
                x-example: id123
              accountCurrency:
                description: Account currency - posting currency (e.g. CZK, EUR)
                type: string
                x-asd-attribute: null
                x-example: CZK
              embossName:
                description: Card holder name
                type: string
                x-asd-attribute: null
                x-example: embossed name
              debitMovementType:
                description: 'Type of transaction (CATALOG: AccountMovementTypes)'
                type: string
                x-asd-attribute: null
                x-catalog: AccountMovementTypes
                x-example: 1
              description:
                description: Description of transaction
                type: string
                x-asd-attribute: null
                x-example: null
              transactionDate:
                description: Date and time of transaction/origination
                type: string
                format: date-time
                x-asd-attribute: null
                x-example: '2016-03-15T10:50:39.000+01:00'
              accountingDate:
                description: Date and time of accounting/posting
                type: string
                format: date-time
                x-asd-attribute: null
                x-example: '2016-03-15T10:50:39.000+01:00'
              transactionAmount:
                description: transaction/origination amount
                type: number
                format: decimal
                x-asd-attribute: null
                x-example: 20
              transactionCurrency:
                description: 'Currency of transaction/origination (e.g. CZK, EUR, USD, etc.)'
                type: string
                minLength: 3
                maxLength: 3
                x-asd-attribute: null
                x-catalog: CURRENCIES
                x-example: CZK
              accountingAmount:
                description: accounting/posting amount
                type: number
                format: decimal
                x-asd-attribute: null
                x-example: 20
              accountingCurrency:
                description: 'Accounting/posting currency of transaction (e.g. CZK, EUR, USD, etc.)'
                type: string
                minLength: 3
                maxLength: 3
                x-asd-attribute: null
                x-catalog: CURRENCIES
                x-example: CZK
              # migratedAccountNumber:
              #   description: Account number of migrated account from other banks (Equa...)
              #   type: object
              #   properties:
              #     accountNumber:
              #       description: Main part of the account number
              #       type: string
              #     accountNumberPrefix:
              #       description: Account number prefix
              #       type: string
              #     bankCode:
              #       description: Account number bank code
              #       type: string
              note:
                $ref: '#/components/schemas/TransactionNote'
              merchant:
                $ref: '#/components/schemas/MerchantInformation'
              # categoryId:
              #   description: The id of transaction category
              #   type: string
              movementGroup:
                description: 'Group/Type of the transaction (CATALOG: AccountMovementGroups)'
                type: string
                x-asd-attribute: null
                x-example: '4'
              wallet:
                $ref: '#/components/schemas/WalletInfo'
        # amountSumsByCurrency:
        #   description: Summed amounts of all movements by currency, separately for
        #     incoming and outgoing (as a map).
        #   type: object
        #   additionalProperties:
        #     type: array
        #     items:
        #       $ref: '#/components/schemas/CurrencyAndAmount'
        # exactTotalElements:
        #   description: ''
        #   type: boolean
        #   x-asd-attribute: null
        #   x-example: true
        # totalElements:
        #   description: The total number of items
        #   type: integer
        #   format: int32
        #   x-asd-attribute: null
        #   x-example: 1
        last:
          description: If true, there is no next page.
          type: boolean
          x-asd-attribute: null
          x-example: true
        # totalPages:
        #   description: The total number of pages
        #   type: integer
        #   format: int32
        #   x-asd-attribute: null
        #   x-example: 1
        # size:
        #   description: The size of one page
        #   type: integer
        #   format: int32
        #   x-asd-attribute: null
        #   x-example: 15
        # number:
        #   description: The identifier of page
        #   type: integer
        #   format: int32
        #   x-asd-attribute: null
        #   x-example: 0
        # first:
        #   description: Is it the first page
        #   type: boolean
        #   x-asd-attribute: null
        #   x-example: true
        sort:
          description: Sorting specification
          type: string
          x-asd-attribute: null
          x-example: null
        # numberOfElements:
        #   description: The number of elements in this page
        #   type: integer
        #   format: int32
        #   x-asd-attribute: null
        #   x-example: 1
    CurrencyAndAmount:
      description: Common object for transferring currency and amount info
      type: object
      required:
      - amount
      - currencyId
      properties:
        amount:
          type: number
          format: decimal
          description: amount
        currencyId:
          $ref: '#/components/schemas/CurrencyId'
    WalletInfo:
      description: Wallet information
      type: object
      properties:
        walletProviderId:
          description: |
            The ID of the wallet provider:
              1 - Apple Pay
              2 - Garmin Pay
              3 - Google Pay
              4 - FitBit Pay
              5 - RaiPay
              6 - Wallet
              7 - Google Pay SE
              8 - Xiaomi
              9 - Fidesmo
              10 - Zepp
              11 - Digiseq
              12 - Swatch
          type: integer
          format: int32
          example: 3
    TransactionNote:
      description: The user-edited transaction note. Note length has maximum 100 characters.
      type: string
      maxLength: 100
      x-asd-attribute: ACCT34
      example: Potraviny
    MerchantInformation:
      #description: Information about merchant
      type: object
      properties:
        name:
          description: Name of the merchant
          type: string
          example: Food garden Kavčí hory
          x-asd-attribute: MAD1
        logoUrl:
          description: Link to the image
          type: string
          example: https://example.com/someMerchantLogo.png
          x-asd-attribute: MAD2
        street:
          description: Merchant shop's street address
          type: string
          example: Na Hřebenech II 1718/10
          x-asd-attribute: MAD3
        postCode:
          description: Merchant shop's post code
          type: string
          example: 140 21
          x-asd-attribute: MAD5
        city:
          description: Merchant shop's city name
          type: string
          example: Praha 4
          x-asd-attribute: MAD6
        country:
          description: Merchant shop's country
          type: string
          example: CZ
          x-catalog: COUNTRIES
          x-asd-attribute: MAD7
        gpsCoordinates:
          #description: GPS coordinates of the shop
          type: object
          required:
          - latitude
          - longitude
          properties:
            latitude:
              #description: Merchant shop's GPS latitude location
              type: number
              format: double
              example: 50.0518111
              x-asd-attribute: MAD8
            longitude:
              #description: Merchant shop's GPS longitude location
              type: number
              format: double
              example: 14.431615
              x-asd-attribute: MAD9
        shopUrl:
          description: Merchant URL
          type: string
          example: https://www.czc.cz
          x-asd-attribute: MAD10
        googlePlaceId:
          description: Google Place ID
          type: string
          example: ChIJnfsgrpWPCUcRLBvzKUJEZSQ
          x-asd-attribute: MAD11
    CurrencyId:
      title: 'The currency id (CATALOG: CURRENCIES)'
      type: string
      minLength: 3
      maxLength: 3
      x-catalog: CURRENCIES
      x-example: CZK
    GetListOfDebitCardTransactionsRequest:
      title: Get list of debit card transactions request
      type: object
      required:
      - clientId
      - accountId
      - cardId
      properties:
        advancedFilter:
          description: Flag that advanced filtering is applied
          type: boolean
        clientId:
          description: User client Id. Return transactions for given client only
          type: integer
          format: int32
          x-asd-attribute: CLI1
          x-example: 2
        accountId:
          description: Account Id. Return transactions for given account only
          type: integer
          format: int64
          x-asd-attribute: null
          x-example: 3
        cardId:
